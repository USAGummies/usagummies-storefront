name: Abra Release Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  compile-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Static production smoke contract
        run: npm run verify:production-smoke

  # live-readiness-gate retired 2026-04-27 — pinged /api/ops/abra/* routes that
  # were removed during the Abra retirement. Compile-gate (typecheck + build +
  # static smoke contract) is the canonical post-push safety net.
  # See production-smoke-test.mjs (kept for manual debugging via verify:production-smoke-live).
