<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>USA Gummies — Promotional Label</title>
<style>
  @page { size: 4in 6in; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Arial', 'Helvetica Neue', sans-serif;
    width: 4in;
    height: 6in;
    padding: 0.22in 0.15in;
    background: #fff;
    color: #000;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .label {
    width: 100%;
    height: 100%;
    border: 4px solid #000;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* STAR BAND */
  .stars {
    background: #000;
    color: #fff;
    padding: 5px 0;
    text-align: center;
    letter-spacing: 0.4em;
    font-size: 13pt;
    border-bottom: 3px solid #000;
  }

  /* HERO LOGO */
  .hero {
    padding: 10px 8px;
    text-align: center;
    border-bottom: 3px solid #000;
  }
  .hero img {
    width: 85%;
    max-height: 1.5in;
    height: auto;
    filter: grayscale(1);
  }

  /* TAGLINE */
  .tagline {
    background: #000;
    color: #fff;
    padding: 8px 0 9px;
    text-align: center;
    border-bottom: 3px solid #000;
    line-height: 1.0;
  }
  .tagline .freedom {
    font-size: 24pt;
    font-weight: 900;
    letter-spacing: 0.08em;
    font-style: italic;
    text-shadow: 2px 2px 0 #000;
    line-height: 0.95;
  }
  .tagline .divider {
    font-size: 8.5pt;
    font-weight: 700;
    letter-spacing: 0.3em;
    margin: 3px 0 2px;
    opacity: 0.9;
  }
  .tagline .dyes {
    font-size: 15pt;
    font-weight: 900;
    letter-spacing: 0.06em;
    line-height: 1.0;
  }
  .tagline .alt {
    display: block;
    font-size: 7.5pt;
    font-weight: 700;
    letter-spacing: 0.25em;
    margin-top: 5px;
  }

  /* CLAIMS GRID */
  .claims {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-bottom: 3px solid #000;
  }
  .claim {
    padding: 6px 6px;
    text-align: center;
    border-right: 2px solid #000;
    border-bottom: 2px solid #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    line-height: 1.1;
  }
  .claim:nth-child(2n) { border-right: none; }
  .claim:nth-last-child(-n+2) { border-bottom: none; }
  .claim .ic {
    font-size: 22pt;
    font-weight: 900;
    line-height: 0.9;
    margin-bottom: 3px;
  }
  .claim .t1 {
    font-size: 10pt;
    font-weight: 900;
    letter-spacing: 0.02em;
    line-height: 1.05;
  }
  .claim .t2 {
    font-size: 6.5pt;
    font-weight: 700;
    margin-top: 3px;
    letter-spacing: 0.02em;
    line-height: 1.15;
  }

  /* FOOTER */
  .footer {
    background: #000;
    color: #fff;
    padding: 7px 8px;
    text-align: center;
  }
  .footer .web {
    font-size: 14pt;
    font-weight: 900;
    letter-spacing: 0.06em;
    line-height: 1.0;
  }
  .footer .sub {
    font-size: 7pt;
    font-weight: 700;
    letter-spacing: 0.2em;
    margin-top: 4px;
  }
</style>
</head>
<body>

<div class="label">
  <div class="stars">&#9733; &#9733; &#9733; &#9733; &#9733;</div>

  <div class="hero">
    <img src="logo.png" alt="USA Gummies">
  </div>

  <div class="tagline">
    <div class="freedom">FREEDOM</div>
    <div class="divider">&mdash; F R O M &mdash;</div>
    <div class="dyes">ARTIFICIAL DYES</div>
    <span class="alt">&#9733; COLORED BY NATURE &#9733;</span>
  </div>

  <div class="claims">
    <div class="claim">
      <div class="ic">&#9733;</div>
      <div class="t1">100% MADE<br>IN THE USA</div>
    </div>
    <div class="claim">
      <div class="ic">&#10005;</div>
      <div class="t1">NO ARTIFICIAL<br>DYES OR COLORS</div>
    </div>
    <div class="claim">
      <div class="ic">&#127827;</div>
      <div class="t1">5 REAL FRUIT<br>FLAVORS</div>
      <div class="t2">CHERRY &bull; WATERMELON<br>ORANGE &bull; APPLE &bull; LEMON</div>
    </div>
    <div class="claim">
      <div class="ic">&#9679;</div>
      <div class="t1">ALLERGEN-FREE<br>(TOP 9)</div>
      <div class="t2">GLUTEN-FREE &bull; NON-GMO</div>
    </div>
  </div>

  <div class="footer">
    <div class="web">USAGUMMIES.COM</div>
    <div class="sub">&#9733; FREEDOM IN EVERY BITE &#9733;</div>
  </div>
</div>

</body>
</html>
